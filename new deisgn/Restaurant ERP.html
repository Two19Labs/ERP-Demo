<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Restaurant ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { height: 100%; }
    body { background: #ececea; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="screens-a.jsx"></script>
  <script type="text/babel" src="screens-b.jsx"></script>
  <script type="text/babel" src="screens-c.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#e6332a"
    }/*EDITMODE-END*/;

    // Curated accent palette — warm, friendly, restaurant-y
    const ACCENTS = [
      '#e6332a', // coral red
      '#d97706', // amber
      '#0f766e', // teal
      '#4f46e5', // indigo
    ];

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.style.setProperty('--accent', t.accent);
      }, [t.accent]);

      return (
        <>
          <DesignCanvas
            background="#ececea"
            title={<span style={{ fontFamily: 'Inter, sans-serif', fontWeight: 600, fontSize: 13 }}>Restaurant ERP · Simple redesign</span>}
            subtitle="All 7 screens. Click any artboard to focus."
          >
            <DCSection id="auth" title="Sign in" subtitle="One screen for owner and staff. Role comes from the account.">
              <DCArtboard id="auth-1" label="Sign in" width={1440} height={900}>
                <AuthScreen />
              </DCArtboard>
            </DCSection>

            <DCSection id="dashboard" title="Dashboard" subtitle="At-a-glance view of stock health, bills, and recent activity.">
              <DCArtboard id="dash-staff" label="Dashboard · staff" width={1440} height={900}>
                <DashboardScreen />
              </DCArtboard>
            </DCSection>

            <DCSection id="setup" title="Stock setup" subtitle="Items and vendors. Owner edit mode.">
              <DCArtboard id="setup-1" label="Stock setup · items" width={1440} height={900}>
                <SetupScreen />
              </DCArtboard>
            </DCSection>

            <DCSection id="capture" title="Bill capture" subtitle="Paste from WhatsApp → AI extracts → owner approves.">
              <DCArtboard id="cap-1" label="Bill capture" width={1440} height={900}>
                <BillCaptureScreen />
              </DCArtboard>
            </DCSection>

            <DCSection id="register" title="New purchase" subtitle="Manual bill entry with preview.">
              <DCArtboard id="reg-1" label="New purchase" width={1440} height={900}>
                <RegisterScreen />
              </DCArtboard>
            </DCSection>

            <DCSection id="ledger" title="Stock ledger" subtitle="Audit trail of every stock movement.">
              <DCArtboard id="led-1" label="Stock ledger" width={1440} height={900}>
                <LedgerScreen />
              </DCArtboard>
            </DCSection>

            <DCSection id="alerts" title="Alerts" subtitle="Suspicious bills and unusual activity.">
              <DCArtboard id="al-1" label="Alerts" width={1440} height={900}>
                <AlertsScreen />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Accent">
              <TweakColor
                label="Accent color"
                value={t.accent}
                options={ACCENTS}
                onChange={(v) => setTweak('accent', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
