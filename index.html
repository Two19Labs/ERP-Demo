<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ghoomar Thali ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box glass-panel animate-fade">
      <p class="eyebrow">Ghoomar Thali ERP</p>
      <h1>Sign in for outlet ops or HQ oversight</h1>
      <p>Use one login screen for outlet managers and HQ users. Your Supabase role mapping decides what you can see.</p>

      <div id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="manager@ghoomar.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Password" required>
        </div>

        <button type="button" id="loginBtn" class="btn btn-primary auth-submit">
          Continue
        </button>
      </div>

      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
